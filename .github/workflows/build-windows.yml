name: Build (Windows)

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        config: [Release, Debug]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (CMake)
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64

      - name: Build
        run: cmake --build build --config ${{ matrix.config }} --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.config }}-binaries
          path: |
            build/bin/${{ matrix.config }}/UniversalBootstrap.exe
            build/bin/${{ matrix.config }}/UniversalTester.exe
          if-no-files-found: error
          
      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          working_directory: build/bin/${{ matrix.config }}
          files: |
            UniversalBootstrap.exe
            UniversalTester.exe